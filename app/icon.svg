<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0f0f0f"/>
  <!-- Antenna -->
  <line x1="16" y1="9" x2="16" y2="5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="4" r="2" fill="#7c3aed"/>
  <!-- Robot head -->
  <rect x="7" y="9" width="18" height="15" rx="3" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="12" cy="15" r="2.5" fill="#7c3aed"/>
  <circle cx="20" cy="15" r="2.5" fill="#7c3aed"/>
  <circle cx="12" cy="15" r="1" fill="white"/>
  <circle cx="20" cy="15" r="1" fill="white"/>
  <!-- Mouth -->
  <rect x="11" y="20" width="10" height="2" rx="1" fill="white" opacity="0.8"/>
</svg>
